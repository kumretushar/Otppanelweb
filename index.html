<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GM TUSHARX VIRTUAL · File Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

  <style>
    /* ===== THEME VARIABLES ===== */
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #e5e7eb;
      --text2: #9ca3af;
      --accent: #00ff99;
      --accent2: #008b45;
      --shadow: 0 8px 30px rgba(0,0,0,0.6);
      --radius: 20px;
      --transition: 0.3s ease;
    }
    body.light {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface2: #e9edf2;
      --border: #d1d5db;
      --text: #0f172a;
      --text2: #475569;
      --shadow: 0 8px 30px rgba(0,0,0,0.08);
      --accent: #6366f1;
      --accent2: #4f46e5;
    }
    body.ocean {
      --bg: #0c1e3a;
      --surface: #0f2847;
      --surface2: #163a5e;
      --border: #1f5a8c;
      --accent: #38bdf8;
      --accent2: #0ea5e9;
      --text: #f0f9ff;
      --text2: #b8d4f0;
    }
    body.neon {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #39ff14;
      --accent: #39ff14;
      --accent2: #00cc00;
      --text: #e0ffe0;
      --text2: #a0f0a0;
      --shadow: 0 0 30px rgba(57,255,20,0.15);
    }
    body.sunset {
      --bg: #1c0f0a;
      --surface: #2d1a10;
      --surface2: #3d2618;
      --border: #c27a3a;
      --accent: #fb923c;
      --accent2: #f97316;
      --text: #fef3c7;
      --text2: #fcd34d;
    }
    body.royal {
      --bg: #140b1e;
      --surface: #1f1230;
      --surface2: #2d1a45;
      --border: #7c3aed;
      --accent: #c084fc;
      --accent2: #a855f7;
      --text: #f3e8ff;
      --text2: #d8b4fe;
    }
    /* ===== BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 20px;
      transition: background var(--transition), color var(--transition);
    }
    .app { max-width: 1280px; margin: 0 auto; }
    /* ===== GLASS ===== */
    .glass {
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: var(--transition);
    }
    .glass:hover { border-color: var(--accent); }
    /* ===== HEADER ===== */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 16px; padding: 16px 24px;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo h1 {
      font-weight: 900; font-size: 1.6rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .theme-picker {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .theme-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer; transition: 0.2s;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
    }
    .theme-btn:hover { transform: scale(1.15); }
    .theme-btn.active { border-color: var(--accent); box-shadow: 0 0 12px var(--accent); }
    /* ===== STATS ===== */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px; margin: 24px 0;
    }
    .stat-card {
      padding: 16px 20px; background: var(--surface2);
      border-radius: 16px; border: 1px solid var(--border);
      transition: 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .stat-card .label { font-size: 0.7rem; text-transform: uppercase; color: var(--text2); letter-spacing: 0.5px; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
    /* ===== CONTROLS ===== */
    .controls {
      display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px;
      align-items: center; padding: 16px 20px;
    }
    .controls input, .controls select {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 16px; border-radius: 12px;
      font-size: 0.9rem; width: 100%; transition: 0.2s;
    }
    .controls input:focus, .controls select:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,255,153,0.1);
    }
    .btn-glow {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; font-weight: 600; border: none;
      padding: 10px 20px; border-radius: 40px; cursor: pointer;
      transition: 0.2s; display: flex; align-items: center; gap: 8px;
      box-shadow: 0 0 20px -4px var(--accent);
    }
    .btn-glow:hover { opacity: 0.85; transform: scale(1.02); }
    .btn-glow:disabled { opacity: 0.5; cursor: wait; }
    /* ===== NUMBER DISPLAY ===== */
    .number-box {
      padding: 24px; text-align: center; margin: 16px 0;
      background: var(--surface2); border-radius: 20px; border: 1px solid var(--border);
    }
    .number-box .number {
      font-size: 2.8rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      word-break: break-all;
    }
    .number-box .flag { font-size: 1.8rem; margin-right: 8px; }
    /* ===== TABLE ===== */
    .table-wrap {
      max-height: 60vh; overflow-y: auto;
      border-radius: 16px; border: 1px solid var(--border);
    }
    .table-wrap table {
      width: 100%; border-collapse: collapse; font-size: 0.85rem;
    }
    .table-wrap th {
      position: sticky; top: 0; z-index: 10;
      background: var(--surface); padding: 12px 16px; text-align: left;
      color: var(--text2); font-weight: 600; text-transform: uppercase; font-size: 0.65rem;
      letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
    }
    .table-wrap td {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      vertical-align: middle; transition: 0.1s;
    }
    .table-wrap tr:hover td { background: var(--surface2); }
    .otp-highlight { color: var(--accent); font-weight: 700; }
    .copy-btn {
      background: transparent; border: none; color: var(--text2); cursor: pointer;
      transition: 0.2s; padding: 4px 8px; border-radius: 6px;
    }
    .copy-btn:hover { color: var(--accent); background: var(--surface2); }
    .source-badge {
      display: inline-block; font-size: 0.6rem; padding: 2px 8px;
      border-radius: 20px; background: var(--accent); color: #000; font-weight: 600;
    }
    /* ===== MODAL ===== */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal-backdrop.show { display: flex; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; max-width: 500px; width: 100%; padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-box h3 { font-size: 1.4rem; margin-bottom: 16px; color: var(--accent); }
    .modal-box .close { float: right; background: none; border: none; color: var(--text2); font-size: 1.6rem; cursor: pointer; }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .controls { grid-template-columns: 1fr; }
      .number-box .number { font-size: 1.8rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body class="royal"> <!-- Default theme: royal (purple) -->
<div class="app">

  <!-- ===== HEADER ===== -->
  <div class="glass header">
    <div class="logo">
      <!-- Logo: update src to your own logo -->
      <img src="https://i.imgpeek.com/ZCAyZIPKJzLs" alt="GM" class="w-12 h-12 rounded-full border-2 border-accent/30">
      <h1>𝗡ᴜᴍʙᴇʀ 𝗦ᴇʀᴠɪᴄᴇ 🍁</h1>
    </div>
    <div class="flex items-center gap-4">
      <div class="theme-picker" id="themePicker">

  <!-- ===== NUMBER DISPLAY ===== -->
  <div class="number-box">

  <!-- ===== OTP TABLE ===== -->
  <div class="glass" style="padding: 16px;">

      <h2 class="text-lg font-bold"><i data-feather="inbox" class="w-5 h-5 inline mr-2" style="color:var(--accent);"></i> Incoming OTPs</h2>
      <span id="smsCount" class="text-sm text-gray-400"></span>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Time</th>

            <th>Message</th>

            <th>AI</th>
          </tr>
        </thead>
        <tbody id="otpTableBody"></tbody>

    <p id="smsError" class="text-red-400 text-center pt-4 hidden"></p>

  <!-- ===== FOOTER ===== -->
  <footer class="text-center text-xs text-gray-500 border-t border-border/30 pt-6 mt-8">
    Powered by <span class="font-bold" style="color:var(--accent);">GM TUSHARX</span> &bull; Official website 🍁
  </footer>
</div>

<!-- ===== AI MODAL ===== -->
<div id="aiModal" class="modal-backdrop" onclick="closeAiModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="close" onclick="closeAiModal()">✕</button>

<script>
  // ============================================================
  //  API ENDPOINTS
  // ============================================================
  const API_ENDPOINTS = [
    { label: 'Konekta', numbers: 'https://hadi-sms.vercel.app/numbers', sms: 'https://hadi-sms.vercel.app/sms' },
    { label: 'NP',      numbers: 'https://sms-api2-virid.vercel.app/numbers',      sms: 'https://sms-api2-virid.vercel.app/sms' },
    { label: 'HADI',    numbers: 'https://kk-sms.vercel.app/numbers',    sms: 'https://kk-sms.vercel.app/sms' }
  ];

  // ============================================================
  //  STATE
  // ============================================================
  let allNumbers = [];
  let currentNumber = null;
  let otpCache = [];
  let totalOtps = 0;

  // ============================================================
  //  DOM REFS
  // ============================================================
  const countrySelect = document.getElementById('countrySelect');
  const generateBtn = document.getElementById('generateBtn');
  const refreshSmsBtn = document.getElementById('refreshSmsBtn');
  const randomNumberDisplay = document.getElementById('randomNumberDisplay');
  const numberFlag = document.getElementById('numberFlag');
  const otpTableBody = document.getElementById('otpTableBody');
  const smsStatus = document.getElementById('smsStatus');
  const smsError = document.getElementById('smsError');
  const smsCount = document.getElementById('smsCount');
  const geminiKeyInput = document.getElementById('geminiKey');
  const aiModal = document.getElementById('aiModal');
  const aiModalContent = document.getElementById('aiModalContent');
  const copyNumberBtn = document.getElementById('copyNumberBtn');
  const totalNumbers = document.getElementById('totalNumbers');
  const totalOtpsEl = document.getElementById('totalOtps');
  const totalCountries = document.getElementById('totalCountries');
  const activeSource = document.getElementById('activeSource');

  // ============================================================
  //  HELPERS
  // ============================================================
  function getFlag(country) {
    const map = {'Venezuela':'🇻🇪','Pakistan':'🇵🇰','India':'🇮🇳','USA':'🇺🇸','Canada':'🇨🇦','UK':'🇬🇧','Brazil':'🇧🇷','Argentina':'🇦🇷','Colombia':'🇨🇴','Mexico':'🇲🇽','France':'🇫🇷','Germany':'🇩🇪','Spain':'🇪🇸','Italy':'🇮🇹','Russia':'🇷🇺','Japan':'🇯🇵','China':'🇨🇳','South Korea':'🇰🇷','Saudi Arabia':'🇸🇦','UAE':'🇦🇪','Egypt':'🇪🇬','Nigeria':'🇳🇬','South Africa':'🇿🇦','Australia':'🇦🇺','New Zealand':'🇳🇿','Indonesia':'🇮🇩','Malaysia':'🇲🇾','Philippines':'🇵🇭','Thailand':'🇹🇭','Vietnam':'🇻🇳','Turkey':'🇹🇷','Greece':'🇬🇷','Netherlands':'🇳🇱','Belgium':'🇧🇪','Switzerland':'🇨🇭','Sweden':'🇸🇪','Norway':'🇳🇴','Poland':'🇵🇱','Portugal':'🇵🇹','Ireland':'🇮🇪','Iceland':'🇮🇸','Hungary':'🇭🇺','Czech':'🇨🇿','Austria':'🇦🇹','Denmark':'🇩🇰','Finland':'🇫🇮','Estonia':'🇪🇪','Latvia':'🇱🇻','Lithuania':'🇱🇹','Moldova':'🇲🇩','Armenia':'🇦🇲','Belarus':'🇧🇾','Ukraine':'🇺🇦','Serbia':'🇷🇸','Montenegro':'🇲🇪','Kosovo':'🇽🇰','Croatia':'🇭🇷','Slovenia':'🇸🇮','Bosnia':'🇧🇦','Macedonia':'🇲🇰','Romania':'🇷🇴','Slovakia':'🇸🇰','Belize':'🇧🇿','Guatemala':'🇬🇹','El Salvador':'🇸🇻','Honduras':'🇭🇳','Nicaragua':'🇳🇮','Costa Rica':'🇨🇷','Panama':'🇵🇦','Haiti':'🇭🇹','Peru':'🇵🇪','Cuba':'🇨🇺','Chile':'🇨🇱','Bolivia':'🇧🇴','Guyana':'🇬🇾','Ecuador':'🇪🇨','Paraguay':'🇵🇾','Uruguay':'🇺🇾','Morocco':'🇲🇦','Algeria':'🇩🇿','Tunisia':'🇹🇳','Libya':'🇱🇾','Gambia':'🇬🇲','Senegal':'🇸🇳','Mauritania':'🇲🇷','Mali':'🇲🇱','Guinea':'🇬🇳','Ivory Coast':'🇨🇮','Burkina Faso':'🇧🇫','Niger':'🇳🇪','Togo':'🇹🇬','Benin':'🇧🇯','Mauritius':'🇲🇺','Liberia':'🇱🇷','Sierra Leone':'🇸🇱','Ghana':'🇬🇭','Chad':'🇹🇩','CAR':'🇨🇫','Cameroon':'🇨🇲','Cape Verde':'🇨🇻','Sao Tome':'🇸🇹','Equatorial Guinea':'🇬🇶','Gabon':'🇬🇦','Congo':'🇨🇬','DRC':'🇨🇩','Angola':'🇦🇴','Guinea-Bissau':'🇬🇼','Seychelles':'🇸🇨','Sudan':'🇸🇩','Rwanda':'🇷🇼','Ethiopia':'🇪🇹','Somalia':'🇸🇴','Djibouti':'🇩🇯','Kenya':'🇰🇪','Tanzania':'🇹🇿','Uganda':'🇺🇬','Burundi':'🇧🇮','Mozambique':'🇲🇿','Zambia':'🇿🇲','Madagascar':'🇲🇬','Reunion':'🇷🇪','Zimbabwe':'🇿🇼','Namibia':'🇳🇦','Malawi':'🇲🇼','Lesotho':'🇱🇸','Botswana':'🇧🇼','Swaziland':'🇸🇿','Comoros':'🇰🇲','Eritrea':'🇪🇷','Aruba':'🇦🇼','Faroe Islands':'🇫🇴','Greenland':'🇬🇱'};
    return map[country] || '🌍';
  }

  function maskNumber(num) {
    if (!num || num.length <= 7) return num || 'N/A';
    return num.slice(0,4) + '••••' + num.slice(-3);
  }

  function setSmsLoading(loading) {
    refreshSmsBtn.disabled = loading;
    refreshSmsBtn.innerHTML = loading ? '<i data-feather="loader" class="w-4 h-4 animate-spin"></i> Loading' : '<i data-feather="refresh-cw" class="w-4 h-4"></i> Refresh';
  }

  function copyToClipboard(text, element) {
    const fallback = () => {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(ta);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(fallback);
    } else fallback();
    if (element) {
      const orig = element.innerHTML;
      element.innerHTML = '<i data-feather="check" class="w-4 h-4"></i>';
      setTimeout(() => { element.innerHTML = orig; }, 1500);
    }
  }

  // ============================================================
  //  FETCH NUMBERS
  // ============================================================
  async function fetchAllNumbers() {
    generateBtn.disabled = true;
    randomNumberDisplay.textContent = 'Loading numbers...';
    document.getElementById('numberError').classList.add('hidden');

    const results = await Promise.all(
      API_ENDPOINTS.map(async api => {
        try {
          const resp = await fetch(api.numbers);
          if (!resp.ok) return [];
          const data = await resp.json();
          if (data && data.success && data.numbers) {
            return data.numbers.map(n => ({ ...n, source: api.label }));
          }
          return [];
        } catch { return []; }
      })
    );
    allNumbers = results.flat();

    if (allNumbers.length === 0) {
      randomNumberDisplay.textContent = '❌ No numbers found';
      document.getElementById('numberError').textContent = 'All APIs failed.';
      document.getElementById('numberError').classList.remove('hidden');
      generateBtn.disabled = false;
      return;
    }

    // Update stats
    totalNumbers.textContent = allNumbers.length;
    const countriesSet = new Set();
    allNumbers.forEach(n => {
      const c = (n.country || 'Unknown').trim();
      if (c) countriesSet.add(c);
    });
    totalCountries.textContent = countriesSet.size;

    // Populate country select
    const sorted = Array.from(countriesSet).sort();
    countrySelect.innerHTML = '<option value="random">🌍 All Countries</option>';
    sorted.forEach(c => {
      countrySelect.innerHTML += `<option value="${c}">${getFlag(c)} ${c}</option>`;
    });
    if (sorted.length) {
      countrySelect.value = sorted[0];
    }
    generateNumber();
    generateBtn.disabled = false;
  }

  // ============================================================
  //  GENERATE NUMBER (filter with trimmed country)
  // ============================================================
  function generateNumber() {
    const country = countrySelect.value.trim();
    let pool = allNumbers;
    if (country !== 'random') {
      pool = allNumbers.filter(n => (n.country || 'Unknown').trim() === country);
    }
    if (pool.length === 0) {
      randomNumberDisplay.textContent = 'No numbers for this country';
      document.getElementById('numberError').textContent = `Try another country.`;
      document.getElementById('numberError').classList.remove('hidden');
      return;
    }
    document.getElementById('numberError').classList.add('hidden');
    const random = pool[Math.floor(Math.random() * pool.length)];
    currentNumber = random;
    const display = random.raw || random.e164 || random.number || 'N/A';
    numberFlag.textContent = getFlag(random.country || 'Unknown');
    randomNumberDisplay.textContent = display;
    activeSource.textContent = random.source || '—';
  }

  // ============================================================
  //  FETCH SMS
  // ============================================================
  async function fetchAllSms() {
    setSmsLoading(true);
    otpTableBody.innerHTML = '';
    smsStatus.textContent = 'Loading OTPs...';
    smsStatus.className = 'text-center text-gray-400 py-6';
    smsError.classList.add('hidden');
    smsCount.textContent = '';

    const results = await Promise.all(
      API_ENDPOINTS.map(async api => {
        try {
          const resp = await fetch(api.sms);
          if (!resp.ok) return [];
          const data = await resp.json();
          if (data && data.success && data.otps) {
            return data.otps.map(o => ({ ...o, source: api.label }));
          }
          return [];
        } catch { return []; }
      })
    );
    let allOtps = results.flat();
    allOtps.sort((a,b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
    const latest = allOtps.slice(0, 20);
    totalOtps = allOtps.length;
    totalOtpsEl.textContent = totalOtps;

    if (latest.length === 0) {
      smsStatus.textContent = 'No OTPs received.';
      smsStatus.className = 'text-center text-gray-400 py-6';
      setSmsLoading(false);
      return;
    }

    let html = '';
    latest.forEach(row => {
      const timestamp = row.timestamp || '';
      const phone = row.number || 'N/A';
      const masked = maskNumber(phone);
      const service = row.service || 'Unknown';
      const fullMsg = row.message || '';
      const country = row.country || 'Unknown';
      const flag = getFlag(country);
      const otpMatch = fullMsg.match(/(\b\d{3,8}\b)/);
      const otpCode = otpMatch ? otpMatch[0] : 'N/A';
      const safeMsg = fullMsg.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, ' ');
      const formattedMsg = fullMsg.replace(/\n/g, '<br>');
      const sourceBadge = `<span class="source-badge" style="background:${row.source==='Konekta'?'#00ff99':row.source==='NP'?'#6366f1':'#f59e0b'};">${row.source}</span>`;

      html += `
        <tr>
          <td class="text-xs text-gray-400">${timestamp}</td>
          <td><span class="text-xs">${flag}</span> ${masked}</td>
          <td><span class="text-xs">${service}</span></td>
          <td>
            <div class="text-sm">${formattedMsg}</div>
            <div class="text-xs text-gray-400">OTP: <span class="otp-highlight">${otpCode}</span></div>
          </td>
          <td><button class="copy-btn" onclick="copyToClipboard('${otpCode.replace(/'/g, "\\'")}', this)"><i data-feather="copy" class="w-4 h-4"></i></button></td>
          <td><button class="copy-btn" onclick="openAiAnalysis('${safeMsg}')"><i data-feather="cpu" class="w-4 h-4"></i></button></td>
        </tr>
      `;
    });

    otpTableBody.innerHTML = html;
    feather.replace();
    smsStatus.className = 'hidden';
    smsCount.textContent = `${latest.length} OTPs (${totalOtps} total)`;
    setSmsLoading(false);
  }

  // ============================================================
  //  AI ANALYSIS
  // ============================================================
  function openAiAnalysis(message) {
    const key = geminiKeyInput.value;
    if (!key) {
      aiModalContent.innerHTML = '<p class="text-red-400">Please enter your Gemini API Key first.</p>';
      aiModal.classList.add('show');
      return;
    }
    aiModalContent.innerHTML = `
      <p class="font-medium">Original:</p>
      <div class="p-3 bg-surface2 rounded-lg text-sm">"${message}"</div>
      <div class="flex justify-center my-4"><div class="w-8 h-8 border-4 border-accent border-t-transparent rounded-full animate-spin"></div></div>
    `;
    aiModal.classList.add('show');
    analyzeWithGemini(message, key);
  }

  function closeAiModal() { aiModal.classList.remove('show'); }

  async function analyzeWithGemini(message, key) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${key}`;
    const payload = {
      contents: [{ parts: [{ text: message }] }],
      systemInstruction: { parts: [{ text: "Analyze this SMS. State purpose (login, marketing, scam). Extract service and OTP code. Use bullet points." }] }
    };
    try {
      const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const data = await resp.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No analysis.';
      aiModalContent.innerHTML = `
        <p class="font-medium">Original:</p>
        <div class="p-3 bg-surface2 rounded-lg text-sm">"${message}"</div>
        <p class="font-medium mt-4">Analysis:</p>
        <div class="p-3 bg-surface2 rounded-lg text-sm">${text.replace(/\n/g, '<br>')}</div>
      `;
    } catch (e) {
      aiModalContent.innerHTML = `<p class="text-red-400">Error: ${e.message}</p>`;
    }
  }

  // ============================================================
  //  THEME SWITCHER
  // ============================================================
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const theme = btn.dataset.theme;
      document.body.className = theme;
    });
  });

  // ============================================================
  //  EVENT BINDINGS
  // ============================================================
  document.addEventListener('DOMContentLoaded', () => {
    feather.replace();
    fetchAllNumbers();
    setTimeout(fetchAllSms, 1500);

    generateBtn.addEventListener('click', generateNumber);
    refreshSmsBtn.addEventListener('click', fetchAllSms);
    countrySelect.addEventListener('change', generateNumber);
    copyNumberBtn.addEventListener('click', () => {
      if (currentNumber) {
        const num = currentNumber.raw || currentNumber.e164 || currentNumber.number || '';
        if (num) copyToClipboard(num, copyNumberBtn);
      }
    });

    // Auto-refresh every 30s
    setInterval(fetchAllSms, 30000);
  });
</script>
</body>
</html>
